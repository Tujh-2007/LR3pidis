name: CI - C#

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Lab3.Auth/Lab3.Auth.csproj

      - name: Build
        run: dotnet build Lab3.Auth/Lab3.Auth.csproj --no-restore --configuration Release

      - name: Run tests with coverage
        run: |
          dotnet test Lab3.Auth.Tests/Lab3.Auth.Tests.csproj \
            --no-build \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage-results \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

